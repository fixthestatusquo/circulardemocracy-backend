name = "circulardemocracy-backend"
main = "src/index.ts"
compatibility_date = "2025-09-17"

# Cron Triggers for scheduled tasks
[triggers]
crons = ["*/5 * * * *"]  # Run every 5 minutes

[env.production]
name = "circular-democracy-prod"

# Environment variables (non-secret)
[env.production.vars]
API_DOMAIN = "api.circulardemocracy.org"
STALWART_DOMAIN = "mail.circulardemocracy.org"
ENVIRONMENT = "production"

# Custom domain routes
[[env.production.routes]]
pattern = "api.circulardemocracy.org"
custom_domain = true

[env.production.ai]
binding = "AI"

# Cron Triggers for production
[env.production.triggers]
crons = ["*/5 * * * *"]  # Run every 5 minutes


[env.staging]
name = "circular-democracy-staging"

[env.staging.vars]
API_DOMAIN = "api-staging.circulardemocracy.org"
STALWART_DOMAIN = "mail.circulardemocracy.org"
ENVIRONMENT = "staging"

[[env.staging.routes]]
pattern = "api-staging.circulardemocracy.org"
custom_domain = true

[env.staging.ai]
binding = "AI"

# Cron Triggers for staging
[env.staging.triggers]
crons = ["*/5 * * * *"]  # Run every 5 minutes

